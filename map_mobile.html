<!doctype html>
<html>
<head>
    <title>Battles of Connecticut Farms and Springfield Mobile Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <link rel="stylesheet" href="Leaflet.PolylineMeasure.css">
    <link rel="stylesheet" href="L.Control.Basemaps.css" />
    <link rel="shortcut icon" href="#">
    <style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }
    #map {
        width: 100%;
        height: 100%;
    }
    .leaflet-control-layers .slider-wrapper {
      margin-left: 20px; /* indent slider under checkbox */
      margin-bottom: 6px;
      font-size: 12px;
    }
    .leaflet-control-layers .slider-wrapper input[type=range] {
      width: 180px;
    }

    /* Additional CSS for mobile display */
    .leaflet-control-layers {
        font-size: 18px;
    }
    
    .leaflet-control-layers label {
        padding: 6px 0;
    }

    .leaflet-image-layer {
        cursor: pointer;
    }

    
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="

    <script src="Leaflet.PolylineMeasure.js"></script>
    <script src="L.Control.Basemaps.js"></script>
    <script>
    var erskineBounds1 = [[40.640749,-74.351080], [40.751984,-74.221804]];
    var erskineBounds2 = [[40.690499,-74.471729], [40.809893,-74.338760]];
    var flemingBounds = [[40.695381,-74.357511], [40.739999,-74.276963]];
    var briantPark = [40.71541960523158,-74.33632850646974];
    var zoomLevel = 15;
    // var map = L.map('map',{maxZoom:19,minZoom:5}).setView(briantPark, zoomLevel);
    var map = L.map('map',{maxZoom:19,minZoom:5}).setView([39.5, -75], 6);

    map.createPane('gpsPane');
    map.getPane('gpsPane').style.zIndex = 1000;

    map.createPane('connecticutPane');
    map.getPane('connecticutPane').style.zIndex = 300;

    map.createPane('springfieldPane');
    map.getPane('springfieldPane').style.zIndex = 200;

    map.createPane('flemingPane');
    map.getPane('flemingPane').style.zIndex = 200;

    // var maps = {

    var maps = {
        "Erskine (1779) Connecticut Farms": L.imageOverlay('Erskine_1779b_NYHS_Leaflet_Compressed.png', erskineBounds1,{opacity:1, pane:'connecticutPane', interactive: true}).addTo(map),
        "Erskine (1779) Springfield": L.imageOverlay('Erskine_1779a_NYHS_Leaflet_Compressed.png', erskineBounds2,{opacity:1, pane:'springfieldPane', interactive: true}).addTo(map),
        "Fleming (1973)": L.imageOverlay('Fleming_1973_Leaflet.png', flemingBounds,{opacity:1, pane:'flemingPane', interactive: true})
    }

    // Flash highlight function
    function flashBounds(bounds) {

    var highlight = L.rectangle(bounds, {
        color: "#1f3a93",     // bright cyan (visible on old maps)
        weight: 4,
        opacity: 1,
        fill: false,
        pane: 'gpsPane'       // ensures it appears ABOVE maps
    }).addTo(map);

    setTimeout(function() {
        map.removeLayer(highlight);
    }, 750);  // duration of flash
    }

    Object.entries(maps).forEach(function([name, layer]) {

    layer.on('click', function() {

        // Reset both panes to base level
        map.getPane('springfieldPane').style.zIndex = 200;
        map.getPane('connecticutPane').style.zIndex = 200;
        map.getPane('flemingPane').style.zIndex = 200;

        // Bring clicked layer's pane to front
        if (layer.options.pane) {
            map.getPane(layer.options.pane).style.zIndex = 300;
        }

    });

    layer.on('dblclick', function(e) {

        // Bring this map to front (your pane logic)
        if (layer.options.pane) {
            map.getPane('springfieldPane').style.zIndex = 200;
            map.getPane('connecticutPane').style.zIndex = 200;
            map.getPane('flemingPane').style.zIndex = 200;

            map.getPane(layer.options.pane).style.zIndex = 300;
        }

        flashBounds(layer.getBounds());

        // Zoom to this map
        map.flyToBounds(layer.getBounds(), {
            maxZoom: zoomLevel,
            padding: [20, 20],
            duration: 1.2
        });

        
        // layer.setOpacity(0.7);

        // setTimeout(function() {
        //     layer.setOpacity(1);
        // }, 150);


    });

    
    layer.on('contextmenu', function(e) {

        // optional: bring to front (recommended)
        map.getPane('springfieldPane').style.zIndex = 200;
        map.getPane('connecticutPane').style.zIndex = 200;
        map.getPane('flemingPane').style.zIndex = 200;

        if (layer.options.pane) {
            map.getPane(layer.options.pane).style.zIndex = 300;
        }

        // zoom
        map.flyToBounds(layer.getBounds(), {
            maxZoom: zoomLevel,
            padding: [20, 20],
            duration: 1.2
        });

    });


    });
    map.doubleClickZoom.disable();
    
    // map.fitBounds(maps["Erskine (1779)"].getBounds(),{
    //     maxZoom: zoomLevel,
    //     padding: [-40, -40]
    // });

    // Initial map bounds
    // var combinedBounds = L.latLngBounds([]);
    // Object.values(maps).forEach(function(layer) {
    //     combinedBounds.extend(layer.getBounds());
    // });

    var boundsMaps = [
    "Erskine (1779) Connecticut Farms",
    "Erskine (1779) Springfield"
    ];
    var combinedBounds = L.latLngBounds([]);
    boundsMaps.forEach(function(name) {
        combinedBounds.extend(maps[name].getBounds());
    });
    
    map.whenReady(function () {

        setTimeout(function() {
            map.flyToBounds(combinedBounds, {
                maxZoom: zoomLevel,
                padding: [-40, -40],
                duration: 1.5
            });
        }, 1000);

    });

    
    // map.on('overlayadd', function(e) {
    //     if (e.layer === maps["Erskine (1779) Connecticut Farms"]) {
    //         map.getPane('connecticutPane').style.zIndex = 300;
    //         map.getPane('springfieldPane').style.zIndex = 200;
    //     } else {
    //         map.getPane('springfieldPane').style.zIndex = 300;
    //         map.getPane('connecticutPane').style.zIndex = 200;
    //     }
    // });

    
    map.on('overlayadd', function(e) {
        setTimeout(function() {
            map.getPane('springfieldPane').style.zIndex = 200;
            map.getPane('connecticutPane').style.zIndex = 200;
            map.getPane('flemingPane').style.zIndex = 200;

            if (e.layer.options.pane) {
                map.getPane(e.layer.options.pane).style.zIndex = 300;
            }
        }, 0);
    });

    // GPS code
    var userMarker;
    var accuracyCircle;

    function onLocationFound(e) {
    if (userMarker) {
        map.removeLayer(userMarker);
        map.removeLayer(accuracyCircle);
    }

    userMarker = L.circleMarker(e.latlng, {
        pane: 'gpsPane',
        radius: 8,
        fillColor: "#007bff",
        color: "#fff",
        weight: 2,
        opacity: 1,
        fillOpacity: 1
    }).addTo(map);

    accuracyCircle = L.circle(e.latlng, {
        pane: 'gpsPane',
        radius: e.accuracy,
        color: "#007bff",
        fillOpacity: 0.1
    }).addTo(map);
    }

    map.locate({
    watch: true,
    enableHighAccuracy: true
    });

    map.on('locationfound', onLocationFound);

    map.on('locationerror', function(e) {
    console.warn("Location error:", e.message);
    });

    //End GPS code

    var basemaps = [
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 5,
                label: 'OpenStreetMap'
            }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri, Maxar, Earthstar Geographics',
                subdomains: 'abcd',
                maxZoom: 19,
                minZoom: 5,
                label: 'Esri imagery'
            })
        ];
    map.addControl(L.control.basemaps({
            basemaps: basemaps,
            tileX: 0,
            tileY: 0,
            tileZ: 1,
            position:'bottomleft'
    }));
    var blackIcon = L.icon({
    iconUrl: 'marker-icon-2x-black.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
    });
    var marker = L.marker(briantPark,{icon:blackIcon});
    marker.bindPopup("<b>Briant Park</b><br>Proposed historic marker area");
    var markerLayer = L.layerGroup([marker]);
    //markerLayer.addTo(map);

    var geoJSONlayer = L.geoJSON(geoJSON, {
        onEachFeature: function (feature, layer) {
            layer.bindPopup("<b>Bryant's Tavern</b><br>Approximate location based on Erskine (1779)");
        },
        style: function (feature) {
            return {
                color: "black",
                weight: 4,
                fillColor: false,
                fillOpacity: 0
            };
        }
    });
    //geoJSONlayer.addTo(map);
    // var imageBounds = [[40.640749,-74.351080], [40.751984,-74.221804]];
    //var overlay = L.imageOverlay('Erskine_1779b_NYHS_Leaflet_Compressed.png', imageBounds,{opacity:1}).addTo(map);
    
    var overlays = {
    //"Bryant's Tavern":geoJSONlayer,
    //"Briant Park": markerLayer,
    ...maps
    };
    
    var baseMaps = {};
    var layersControl = L.control.layers(baseMaps, overlays,{collapsed:true}).addTo(map);

    //     slider.addEventListener("input", function() {
    //         layer.setOpacity(this.value);
    //     });
    //     }
    // });
    // });

    map.whenReady(function () {

    var overlaysList = layersControl.getContainer()
        .querySelector('.leaflet-control-layers-overlays');

    var labels = overlaysList.querySelectorAll('label');

    labels.forEach(function(label) {

        // Get the layer name reliably
        var layerName = label.textContent.trim();

        var layer = maps[layerName];

        if (layer && layer instanceof L.ImageOverlay) {

            // Create wrapper INSIDE this label
            var sliderWrapper = L.DomUtil.create('div', 'slider-wrapper');

            sliderWrapper.innerHTML = `
                <input type="range" min="0" max="1" step="0.05" value="${layer.options.opacity}">
            `;

            // Append directly to THIS label
            label.appendChild(sliderWrapper);

            L.DomEvent.disableClickPropagation(sliderWrapper);

            var slider = sliderWrapper.querySelector('input');

            slider.addEventListener("input", function() {
                layer.setOpacity(this.value);
            });
        }
    });

});
    // End of slider code

    L.control.polylineMeasure({unit:'landmiles',showUnitControl:true,unitControlUnits:["kilometres", "landmiles"],measureControlLabel:'&#128207;',measureControlTitleOn: 'Turn on measure tool',measureControlTitleOff: 'Turn off measure tool'}).addTo(map);
